name: Ежедневный backup базы данных

# Работает на серверах GitHub, не зависит от того, включён ли ноутбук —
# см. project_studio_lk_backup_pending (решение о планировщике было отложено,
# принято 2026-07-16 после инцидента с потерей cms_audit_log). Использует уже
# существующий scripts/db-backup/create.mjs — тот же скрипт, что и
# `npm run db:backup` локально, без внешних npm-зависимостей (только
# встроенные модули Node), поэтому npm install не нужен.
on:
  schedule:
    # 03:00 по Europe/Moscow (UTC+3) = 00:00 UTC — вне рабочего времени студии
    - cron: '0 0 * * *'
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # pg_dump отказывается снимать дамп с БД НОВЕЕ своей собственной версии
      # (aborting because of server version mismatch) — Ubuntu-репозиторий даёт
      # только postgresql-client 16.x, а управляемый Postgres в Yandex Cloud
      # сейчас 17.x. Из-за этого несоответствия все запланированные бэкапы
      # молча падали как минимум с 2026-07-17 (см. память проекта — обнаружено
      # и исправлено 2026-07-22 перед миграцией схемы Document.number).
      # Ставим клиент версии 17 из официального репозитория PGDG, а не то, что
      # даст обычный apt-get install postgresql-client.
      - name: Install postgresql-client-17 (pg_dump matching server major version)
        run: |
          sudo apt-get install -y curl ca-certificates gnupg
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          . /etc/os-release
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt ${VERSION_CODENAME}-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          pg_dump --version

      - name: Create backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BACKUP_DIR: ${{ runner.temp }}/studio-lk-backups
        run: node scripts/db-backup/create.mjs

      # GitHub Actions runner эфемерный — файл не переживёт джобу сам по
      # себе, поэтому сохраняем его как artifact. retention-days ограничивает
      # хранение 90 днями (максимум GitHub) — это не замена долгосрочному
      # архивному хранилищу (см. AGENTS.md "Data Safety and Audit Integrity",
      # известное ограничение).
      - name: Upload backup artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: studio-lk-db-backup-${{ github.run_id }}
          path: ${{ runner.temp }}/studio-lk-backups/*.sql.gz*
          retention-days: 90
          if-no-files-found: error

      - name: Upload backup log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: studio-lk-db-backup-log-${{ github.run_id }}
          path: ${{ runner.temp }}/studio-lk-backups/backup.log
          retention-days: 90
          if-no-files-found: ignore
